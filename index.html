<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora AnaLucia</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center; /* centra horizontal */
            align-items: center;     /* centra vertical */
            height: 100vh;
            background-color: #f2f2f2;
        }

        .contenedor {
            display: flex;
            flex-direction: column; /* elementos en columna */
            justify-content: center;
            border: 2px solid black;
            padding: 20px;
            width: 350px;
            background-color: white;
        }

        h1 {
            text-align: center;
        }

        .fila {
            display: flex;
            justify-content: space-between; /* separa label e input */
            margin: 5px 0;
        }

        input, select {
            width: 150px;
        }

        button {
            margin-top: 10px;
            padding: 5px;
        }
    </style>
</head>

<body>

    <div class="contenedor">
        <h1>Aplicación suma de números</h1>

        <div class="fila">
            <label>Número 1:</label>
            <input type="number" id="num1">
        </div>

        <div class="fila">
            <label>Número 2:</label>
            <input type="number" id="num2">
        </div>

        <div class="fila">
            <label>Operación:</label>
            <select id="operacion">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="*">*</option>
                <option value="/">/</option>
            </select>
        </div>

        <div class="fila">
            <label>Resultado:</label>
            <input type="text" id="resultado" disabled>
        </div>

        <button onclick="calcular()">Calcular</button>
    </div>

    <script>
        function calcular() {
            let n1 = parseFloat(document.getElementById("num1").value);
            let n2 = parseFloat(document.getElementById("num2").value);
            let op = document.getElementById("operacion").value;
            let resultado;

            if (isNaN(n1) || isNaN(n2)) {
                alert("Ingresa ambos números");
                return;
            }

            if (op === "+") {
                resultado = n1 + n2;
            } else if (op === "-") {
                resultado = n1 - n2;
            } else if (op === "*") {
                resultado = n1 * n2;
            } else if (op === "/") {
                if (n2 === 0) {
                    resultado = "Error";
                } else {
                    resultado = n1 / n2;
                }
            }

            document.getElementById("resultado").value = resultado;
        }
    </script>

</body>
</html>
